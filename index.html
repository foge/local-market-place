<div id="auth">
  <h2>Local Marketplace Login</h2>
  <input id="username" placeholder="Enter your name">
  <button onclick="login()">Enter</button>
</div>

<div id="app" style="display:none;">

  <h1>Local Marketplace</h1>

  <div class="tabs">
    <button onclick="setMode('buy')">Buy & Sell</button>
    <button onclick="setMode('services')">Services</button>
    <button onclick="showAll()">All</button>
  </div>

  <div class="container">

    <div class="form">
      <h2>Post Listing</h2>

      <input id="title" placeholder="What are you offering?">
      <input id="price" placeholder="Price">
      <input id="contact" placeholder="Contact">
      <input id="location" placeholder="Town">

      <select id="type">
        <option value="buy">Buy & Sell</option>
        <option value="services">Services</option>
      </select>

      <button onclick="addListing()">Post</button>
    </div>

    <div class="listings">
      <h2>Listings</h2>
      <div id="list"></div>
    </div>

  </div>

</div>
