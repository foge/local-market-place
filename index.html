<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Local Marketplace</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="auth">
  <h2>Enter Marketplace</h2>
  <input id="username" placeholder="Enter your name">
  <button onclick="login()">Enter</button>
</div>

<div id="app" style="display:none;">

  <h1>Local Marketplace</h1>
  <p>Buy, sell, and find local services</p>

  <div class="container">

    <div class="form">
      <h2>Post Listing</h2>

      <input id="title" placeholder="Item / Service">
      <input id="price" placeholder="Price">
      <input id="contact" placeholder="Contact">
      <input id="location" placeholder="Town">

      <select id="type">
        <option value="buy">Buy & Sell</option>
        <option value="services">Services</option>
      </select>

      <button onclick="addListing()">Post</button>
    </div>

    <div class="listings">
      <h2>Listings</h2>
      <div id="list"></div>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
